name: zouz_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  dio: ^5.9.1
  easy_localization: ^3.0.8
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.3
  go_router: ^17.1.0
  webview_flutter: ^4.10.0
  intl: ^0.20.2
  lottie: ^3.3.2
  mobile_scanner: ^7.2.0
  permission_handler: ^11.3.1
  qr_flutter: ^4.1.0
  riverpod_annotation: any
  pinput: any
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.4
  crisp_chat: ^2.6.0
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.9.0
  riverpod_generator: any
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/

  fonts:
    - family: SFUIDisplay
      fonts:
        - asset: assets/fonts/SFUIDisplay-Regular.otf
        - asset: assets/fonts/SFUIDisplay-Light.ttf
          weight: 300
    - family: Noor
      fonts:
        - asset: assets/fonts/NoorRegular.ttf
